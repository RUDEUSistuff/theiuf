<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Calculator</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div id="startScreen">
    <h1>⚡ Ultimate Calculator</h1>
    <button id="startBtn">START</button>
</div>

<div id="app">
    <h2>🔥 Mega System</h2>

    <div class="topBtns">
        <button id="mathBtn">Math</button>
        <button id="physicsBtn">Physics</button>
        <button id="shapeBtn">3D</button>
        <button id="atomsBtn">Atoms</button>
        <button id="puzzleBtn">Puzzle</button>
    </div>

    <div id="buttons"></div>
    <div id="inputs"></div>

    <input id="mainInput" placeholder="Type here">

    <div id="canvasBox"></div>

    <button id="calcBtn">Calculate</button>

    <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
